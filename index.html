<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <style>
      #app-loader {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #FDFCFB;
        z-index: 9999;
        font-family: serif;
        color: #76845E;
        flex-direction: column;
        gap: 20px;
      }
      .spinner {
        width: 40px;
        height: 40px;
        border: 2px solid #76845E20;
        border-top: 2px solid #76845E;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
    
    <!-- SEO -->
    <title>Selene | Semijoias de Luxo</title>
    <meta name="description" content="Selene - Curadoria exclusiva de semijoias de luxo. Peças minimalistas, sofisticadas e com banho premium para momentos inesquecíveis." />
    <meta name="keywords" content="semijoias, luxo, acessórios femininos, selene, joias premium, colares, brincos, anéis" />
    <meta name="author" content="Selene Semijoias" />

    <!-- Favicon - Moon themed for Selene -->
    <link rel="icon" type="image/svg+xml" href="https://api.iconify.design/lucide:moon-star.svg?color=%2376845E" />
    
    <!-- Open Graph (Social Media) -->
    <meta property="og:title" content="Selene | Semijoias de Luxo" />
    <meta property="og:description" content="Descubra a elegância em cada detalhe. Semijoias feitas para brilhar." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://picsum.photos/seed/selene-jewelry/1200/630" />
  </head>
  <body>
    <div id="app-loader">
      <div class="spinner"></div>
      <p style="letter-spacing: 0.3em; text-transform: uppercase; font-size: 10px;">Selene</p>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Remove o loader assim que o script principal carregar
      window.addEventListener('load', function() {
        setTimeout(function() {
          var loader = document.getElementById('app-loader');
          if (loader) loader.style.display = 'none';
        }, 500);
      });
    </script>
  </body>
</html>
